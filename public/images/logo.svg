<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 36" fill="none">
  <style>
    .logo-text { fill: #1b1b18; }
    @media (prefers-color-scheme: dark) {
      .logo-text { fill: #EDEDEC; }
    }
  </style>
  <!-- 2x2 grid icon representing CMS content -->
  <rect x="2" y="3" width="13" height="13" rx="2.5" fill="#3B4A99"/>
  <rect x="19" y="3" width="13" height="13" rx="2.5" fill="#3B4A99" opacity="0.55"/>
  <rect x="2" y="20" width="13" height="13" rx="2.5" fill="#3B4A99" opacity="0.55"/>
  <rect x="19" y="20" width="13" height="13" rx="2.5" fill="#3B4A99"/>
  <!-- Brand name -->
  <text x="42" y="27" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5" class="logo-text">WebPro<tspan fill="#3B4A99">CMS</tspan></text>
</svg>
